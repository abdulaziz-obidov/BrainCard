services:
  postgres:
    image: postgres:16-alpine
    container_name: braincards-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: braincards
      POSTGRES_PASSWORD: braincards
      POSTGRES_DB: braincards
    ports:
      - "5432:5432"
    volumes:
      - braincards_pg:/var/lib/postgresql/data

volumes:
  braincards_pg:
